name: metrogen-stg

services:
  db:
    image: postgres:16-alpine
    container_name: metroGen_db_stg
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metrologenerator_stg}
      POSTGRES_USER: ${POSTGRES_USER:-metrologenerator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metrologenerator}
    volumes:
      - pgdata_stg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metrologenerator} -d ${POSTGRES_DB:-metrologenerator_stg}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_STG_PORT:-5437}:5432"

  api:
    build: .
    container_name: metroGen_api_stg
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-metrologenerator}:${POSTGRES_PASSWORD:-metrologenerator}@db:5432/${POSTGRES_DB:-metrologenerator_stg}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:9174}
      ARSHIN_TIMEOUT: "32"
      ARSHIN_CONCURRENCY: "2"
      ARSHIN_RETRY_ATTEMPTS: "4"
      ARSHIN_FAST_FAIL: "0"
      PROTOCOL_BUILD_CONCURRENCY: "2"
      UVICORN_RELOAD: "0"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/docs >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "${API_STG_PORT:-9001}:8000"
    volumes:
      - .:/app
      - api_venv_stg:/app/.venv
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_API_PROXY_TARGET: http://api:8000
    container_name: metroGen_frontend_stg
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_STG_PORT:-9174}:80"

volumes:
  api_venv_stg:
  pgdata_stg:
