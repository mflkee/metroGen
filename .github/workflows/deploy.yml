name: Deploy metroGen to Production

on:
  push:
    branches: [release/*]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, mkair-runner]
    environment: production
    steps:
      - name: Pull latest code
        run: |
          cd ~/apps/metroGen
          # Сохраняем существующий .env перед git reset --hard
          if [ -f .env ]; then
            cp .env /tmp/metrogen_env_backup
            echo "Backed up existing .env"
          fi
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}
          # Восстанавливаем .env (он был удалён из git для security)
          if [ -f /tmp/metrogen_env_backup ]; then
            cp /tmp/metrogen_env_backup .env
            echo "Restored .env from backup"
          else
            echo "WARNING: no existing .env found, creating from .env.example"
            cp .env.example .env
          fi
          # Убеждаемся что .env не попадёт в git accidentally
          if ! grep -q "^\.env$" .gitignore 2>/dev/null; then
            echo ".env" >> .gitignore
          fi

      - name: Backup production database
        run: |
          cd ~/apps/metroGen
          docker compose exec -T db pg_dump -U metrologenerator metrologenerator > /tmp/metroGen_backup_$(date +%Y%m%d_%H%M%S).sql

      - name: Build & deploy production
        run: |
          cd ~/apps/metroGen
          docker compose up -d --build

      - name: Health check
        run: |
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:8001/docs >/dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to become ready within 30s"
          exit 1

      - name: Show status
        if: always()
        run: |
          cd ~/apps/metroGen
          docker compose ps
