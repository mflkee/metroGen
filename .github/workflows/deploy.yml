name: Deploy metroGen to mkair-server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, mkair]
    steps:
      - name: Pull latest code
        run: |
          cd ~/apps/metroGen
          git fetch origin
          git reset --hard origin/main

      - name: Build & deploy
        run: |
          cd ~/apps/metroGen
          docker compose up -d --build

      - name: Health check
        run: |
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:8001/docs >/dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to become ready within 30s"
          exit 1

      - name: Show status
        if: always()
        run: |
          cd ~/apps/metroGen
          docker compose ps
