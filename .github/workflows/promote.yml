name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to promote staging to production'
        required: true
        default: ''

jobs:
  promote:
    runs-on: [self-hosted, mkair]
    environment: production
    if: github.event.inputs.confirm == 'deploy'
    steps:
      - name: Pull latest code
        run: |
          cd ~/apps/metroGen
          git fetch origin
          git reset --hard origin/main

      - name: Backup production database
        run: |
          cd ~/apps/metroGen
          docker compose exec -T db pg_dump -U metrologenerator metrologenerator > /tmp/metroGen_backup_$(date +%Y%m%d_%H%M%S).sql

      - name: Build & deploy production
        run: |
          cd ~/apps/metroGen
          docker compose up -d --build

      - name: Production health check
        run: |
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:8001/docs >/dev/null 2>&1; then
              echo "Production API is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Production API failed to become ready within 30s"
          exit 1

      - name: Show production status
        if: always()
        run: |
          cd ~/apps/metroGen
          docker compose ps
