name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: [self-hosted, mkair-runner]
    environment: staging
    steps:
      - name: Checkout staging code
        run: |
          cd ~/apps/metroGen
          # Сохраняем существующий .env перед git reset --hard
          if [ -f .env ]; then
            cp .env /tmp/metrogen_env_backup
            echo "Backed up existing .env"
          fi
          git fetch origin
          git reset --hard origin/main
          # Восстанавливаем .env (он был удалён из git для security)
          if [ -f /tmp/metrogen_env_backup ]; then
            cp /tmp/metrogen_env_backup .env
            echo "Restored .env from backup"
          else
            echo "WARNING: no existing .env found, creating from .env.example"
            cp .env.example .env
          fi
          # Убеждаемся что .env не попадёт в git accidentally
          if ! grep -q "^\.env$" .gitignore 2>/dev/null; then
            echo ".env" >> .gitignore
          fi
          git update-index --assume-unchanged .env

      - name: Build & deploy staging
        run: |
          cd ~/apps/metroGen
          docker compose -f docker-compose.staging.yml up -d --build

      - name: Staging health check
        run: |
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:9001/docs >/dev/null 2>&1; then
              echo "Staging API is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Staging API failed to become ready within 30s"
          exit 1

      - name: Show staging status
        if: always()
        run: |
          cd ~/apps/metroGen
          docker compose -f docker-compose.staging.yml ps
