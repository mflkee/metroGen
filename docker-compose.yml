services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: metrologenerator
      POSTGRES_USER: metrologenerator
      POSTGRES_PASSWORD: metrologenerator
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metrologenerator -d metrologenerator"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "15432:5432"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://metrologenerator:metrologenerator@db:5432/metrologenerator
      ARSHIN_TIMEOUT: "32"
      ARSHIN_CONCURRENCY: "2"
      PROTOCOL_BUILD_CONCURRENCY: "2"
      UVICORN_RELOAD: "1"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  pgdata:
